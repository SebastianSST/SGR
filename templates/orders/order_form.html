{% extends 'base.html' %}

{% block title %}{{ title }} - SIGR{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2>
            <i class="fas fa-shopping-cart"></i> {{ title }}
        </h2>
    </div>
</div>

<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ order_form.as_p }}
                    
                    <h4>Platos de la Orden</h4>
                    {{ formset.management_form }}
                    <div id="formset-container">
                        {% for form in formset %}
                            <div class="formset-row mb-3">
                                {{ form.as_p }}
                            </div>
                        {% endfor %}
                    </div>
                    
                    <div class="mt-3">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Guardar Orden
                        </button>
                        <a href="{% url 'orders:order_list' %}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
